name: Smart Contracts CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Soroban Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract tests
        run: cargo test --workspace

      - name: Build WASM artifacts
        run: cargo build --target wasm32-unknown-unknown --release

  deploy:
    name: Deploy to Stellar Testnet
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build WASM artifacts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli || true

      - name: Deploy contracts to testnet
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
          STELLAR_NETWORK: testnet
        run: |
          echo "Deploying contracts to Stellar testnet..."
          # Deploy each contract WASM to testnet
          # Uncomment and configure once Stellar CLI credentials and network are set up:
          #
          # for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
          #   contract_name=$(basename "$wasm" .wasm)
          #   echo "Deploying $contract_name..."
          #   stellar contract deploy \
          #     --wasm "$wasm" \
          #     --source "$STELLAR_SECRET_KEY" \
          #     --network testnet
          # done
          echo "Contract deployment step configured. Set STELLAR_SECRET_KEY secret and uncomment deploy commands to enable."
